<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Přihlášení — dokončení — Verca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap&subset=latin,latin-ext" rel="stylesheet">
<link rel="stylesheet" href="css/verca-transitions.css">
<link rel="stylesheet" href="css/verca-legal.css">
<style>
  .auth-callback-box { max-width: 28rem; margin: 0 auto; padding: 2rem 1.25rem; text-align: center; }
  .auth-callback-box p { color: var(--legal-muted); margin-bottom: 1rem; }
  .auth-callback-actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 1.5rem; }
  .auth-callback-actions a {
    font-family: var(--legal-font-body);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--legal-terracotta);
    padding: 10px 20px;
    border: 1px solid rgba(184, 100, 71, 0.35);
    border-radius: 999px;
  }
  .auth-callback-actions a:hover { background: rgba(184, 100, 71, 0.08); }
</style>
</head>
<body class="verca-legal-page">
<script src="js/verca-perf-boot.js"></script>
<script src="js/verca-page-transition.js"></script>

<header class="verca-legal-header">
  <a class="verca-legal-brand" href="index.html">Verca</a>
  <a class="verca-legal-back" href="bylinny-atelier.html">← Ateliér</a>
</header>

<main class="verca-legal-wrap">
  <div class="auth-callback-box">
    <h1 class="verca-legal-doc" style="margin-top:0;font-size:1.75rem;">Přihlášení</h1>
    <p id="auth-callback-msg">Zpracováváme přihlášení…</p>
    <div class="auth-callback-actions">
      <a href="bylinny-atelier.html">Zpět do ateliéru</a>
      <a href="index.html">Úvodní stránka</a>
    </div>
  </div>
</main>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.1';

  const msg = document.getElementById('auth-callback-msg');

  try {
    const res = await fetch('/api/public-config', { credentials: 'same-origin' });
    const cfg = await res.json();
    if (!cfg.configured || !cfg.supabaseUrl || !cfg.supabaseAnonKey) {
      msg.textContent = 'Chybí konfigurace Supabase. Doplňte SUPABASE_URL a SUPABASE_ANON_KEY (nebo NEXT_PUBLIC_* aliasy).';
      throw new Error('no config');
    }

    const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: {
        detectSessionInUrl: true,
        persistSession: true,
        flowType: 'pkce',
      },
    });

    const url = new URL(window.location.href);
    const hashRaw = window.location.hash && window.location.hash.length > 1 ? window.location.hash.slice(1) : '';
    const hashParams = new URLSearchParams(hashRaw);

    const hashErr = hashParams.get('error_description') || hashParams.get('error');
    if (hashErr) {
      msg.textContent = 'OAuth chyba: ' + decodeURIComponent(String(hashErr).replace(/\+/g, ' '));
      throw new Error('oauth_hash');
    }

    const accessFromHash = hashParams.get('access_token');
    const refreshFromHash = hashParams.get('refresh_token');
    if (accessFromHash && refreshFromHash) {
      const { data: hashData, error: hashSetErr } = await supabase.auth.setSession({
        access_token: accessFromHash,
        refresh_token: refreshFromHash,
      });
      if (hashSetErr) {
        msg.textContent =
          'Nepodařilo se uložit relaci z návratu Google: ' + (hashSetErr.message || 'chyba setSession');
        throw hashSetErr;
      }
      window.history.replaceState({}, '', url.pathname + url.search);
      const hu = hashData && hashData.session && hashData.session.user;
      if (hu) {
        const em = hu.email || 'účet bez e-mailu';
        msg.textContent =
          'Jste přihlášeni jako ' + em + '. Pokračujte do ateliéru — údaje účtu načteme i na serveru (/api/account/me).';
        return;
      }
    }

    const oauthErr = url.searchParams.get('error_description') || url.searchParams.get('error');
    if (oauthErr) {
      msg.textContent = 'OAuth chyba: ' + decodeURIComponent(String(oauthErr).replace(/\+/g, ' '));
      throw new Error('oauth_query');
    }

    const code = url.searchParams.get('code');

    const { data: existing } = await supabase.auth.getSession();
    if (!code && existing && existing.session && existing.session.user) {
      const em = existing.session.user.email || 'účet bez e-mailu';
      msg.textContent =
        'Jste přihlášeni jako ' + em + '. Pokračujte do ateliéru — relace je již uložená v tomto prohlížeči.';
      return;
    }

    if (code) {
      const { data: exData, error: exErr } = await supabase.auth.exchangeCodeForSession(code);
      if (exErr) {
        const detail =
          exErr.message ||
          'chyba OAuth (zkuste znovu z ateliéru na stejné doméně, kde jste klikli na Google — PKCE musí být na stejném originu).';
        msg.textContent = 'Dokončení přihlášení se nepodařilo: ' + detail;
        throw exErr;
      }
      url.searchParams.delete('code');
      const clean = url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : '') + url.hash;
      window.history.replaceState({}, '', clean);

      const s = exData && exData.session;
      if (s && s.user) {
        const em = s.user.email || 'účet bez e-mailu';
        msg.textContent =
          'Jste přihlášeni jako ' + em + '. Pokračujte do ateliéru — údaje účtu načteme i na serveru (/api/account/me).';
        return;
      }
    }

    if (!code && !accessFromHash) {
      msg.textContent =
        'V adrese chybí návrat z přihlášení (očekává se ?code=… pro PKCE nebo #access_token=…). Zkuste znovu z ateliéru na ' +
        window.location.origin +
        ' a v Supabase → Authentication → Redirect URLs přidejte ' +
        window.location.origin +
        '/auth-callback.html';
      return;
    }

    const { data: { session }, error } = await supabase.auth.getSession();
    if (error) {
      msg.textContent = 'Přihlášení se nepodařilo: ' + (error.message || 'neznámá chyba');
    } else if (session && session.user) {
      const em = session.user.email || 'účet bez e-mailu';
      msg.textContent = 'Jste přihlášeni jako ' + em + '. Pokračujte do ateliéru — údaje účtu načteme i na serveru (/api/account/me).';
    } else {
      msg.textContent =
        'Relace se nepodařila uložit. Zkuste znovu přihlášení z ateliéru na ' +
        window.location.origin +
        ' (stejná doména jako návrat z Google).';
    }
  } catch (e) {
    if (msg && !/chybí|nepodařilo|oauth|relaci|přihlášeni jako/i.test(msg.textContent)) {
      msg.textContent = 'Chyba při načtení (spusťte web přes Vercel / vercel dev, ne file://).';
    }
  }
</script>
</body>
</html>
